    # {{ date }} A股涨停板复盘研报

    ## 一、市场情绪
    {{ sentiment }}

    ## 二、涨停股池（Top {{ top_n }}）
    {{ limit_up_table }}

    ## 三、龙虎榜核心席位
    {{ dragon_tiger_table }}

